name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libdbus-1-dev pkg-config libgtk-3-dev libwayland-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libpipewire-0.3-dev libgbm-dev libdrm-dev libegl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  build-gui:
    name: Build GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libdbus-1-dev pkg-config libgtk-3-dev libwayland-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libpipewire-0.3-dev libgbm-dev libdrm-dev libegl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libdbus-1-dev pkg-config libgtk-3-dev libwayland-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libpipewire-0.3-dev libgbm-dev libdrm-dev libegl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
