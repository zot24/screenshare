name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## Downloads

            | Platform | Binary | Installer |
            |----------|--------|-----------|
            | macOS (Apple Silicon) | `screenshare-macOS-arm64.tar.gz` | `.dmg` |
            | macOS (Intel) | `screenshare-macOS-x86_64.tar.gz` | `.dmg` |
            | Linux (x86_64) | `screenshare-Linux-x86_64.tar.gz` | `.deb`, `.AppImage` |

            ### Quick install

            ```bash
            # macOS (Apple Silicon)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/screenshare-macOS-arm64.tar.gz | tar xz
            ./screenshare

            # Linux
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/screenshare-Linux-x86_64.tar.gz | tar xz
            ./screenshare
            ```
          draft: false
          prerelease: false

  build-binaries:
    name: Build (${{ matrix.platform.name }})
    needs: create-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: screenshare
          - name: macOS-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: screenshare
          - name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: screenshare
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libdbus-1-dev pkg-config libgtk-3-dev libwayland-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libpipewire-0.3-dev libgbm-dev libdrm-dev libegl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build release binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.platform.target }}

      - name: Package binary
        run: |
          cd src-tauri/target/${{ matrix.platform.target }}/release
          tar czf screenshare-${{ matrix.platform.name }}.tar.gz ${{ matrix.platform.binary }}
          mv screenshare-${{ matrix.platform.name }}.tar.gz ../../../../

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: screenshare-${{ matrix.platform.name }}.tar.gz

  build-tauri-bundles:
    name: Tauri Bundle (${{ matrix.platform.name }})
    needs: create-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libdbus-1-dev pkg-config libgtk-3-dev libwayland-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libpipewire-0.3-dev libgbm-dev libdrm-dev libegl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
